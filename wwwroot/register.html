<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVW Ledger — Manage Users</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e1a2e;
    --card:      #1a2744;
    --card2:     #1e2e50;
    --panel:     #162038;
    --cyan:      #00bcd4;
    --cyan-dim:  rgba(0,188,212,0.13);
    --white:     #ffffff;
    --silver:    #a8bdd0;
    --smoke:     #6b84a0;
    --ruby:      #ef5350;
    --ru-dim:    rgba(239,83,80,0.13);
    --sapphire:  #42a5f5;
    --sa-dim:    rgba(66,165,245,0.13);
    --border:    rgba(255,255,255,0.08);
    --font-sans: 'Plus Jakarta Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 90% 70% at 15% 100%, #0a2a4a 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 85%   0%, #0c2040 0%, transparent 50%);
    color: var(--silver);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ─────────────────────────── */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    height: 62px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 36px;
    flex-shrink: 0;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #00bcd4, #0097a7);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }

  .brand-name { font-size: 16px; font-weight: 700; color: var(--white); }

  .back-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--silver);
    font-family: var(--font-sans);
    font-size: 13px; font-weight: 500;
    padding: 8px 15px;
    cursor: pointer; transition: all 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--white); }

  /* ── BODY ───────────────────────────── */
  .page-body {
    flex: 1;
    display: flex; justify-content: center;
    padding: 40px 24px 60px;
  }

  .page-wrap { width: 100%; max-width: 620px; }

  .page-head { margin-bottom: 28px; }

  .page-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 7px;
  }

  .page-title { font-size: 26px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .page-desc  { font-size: 13.5px; color: var(--smoke); }

  /* ── SECTION CARD ───────────────────── */
  .section {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .section-head {
    padding: 15px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .section-title {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--cyan); font-weight: 500;
  }

  .section-body { padding: 22px; }

  /* ── FORM ───────────────────────────── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

  .field { display: flex; flex-direction: column; gap: 7px; }

  .field label {
    font-size: 12px; font-weight: 600; color: var(--white);
  }

  .field-input-wrap { position: relative; }

  .field input,
  .field select {
    width: 100%;
    background: #ffffff;
    border: 2px solid transparent;
    border-radius: 10px;
    color: #0f1e35;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 500;
    padding: 12px 13px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .field input::placeholder { color: #9ab0c8; font-weight: 400; }
  .field input:focus,
  .field select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,188,212,0.18);
  }
  .field input.input-error {
    border-color: var(--ruby);
    box-shadow: 0 0 0 3px rgba(239,83,80,0.16);
  }
  .field select option { background: #1a2744; color: white; }

  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #9ab0c8;
    cursor: pointer; padding: 4px;
    display: flex; align-items: center; transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--cyan); }

  .field-hint { font-family: var(--font-mono); font-size: 10.5px; color: var(--smoke); min-height: 16px; }
  .field-hint.success { color: #4caf50; }
  .field-hint.error   { color: var(--ruby); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 20px; border-radius: 9px;
    font-size: 14px; font-weight: 600;
    font-family: var(--font-sans);
    cursor: pointer; border: none; outline: none;
    transition: all 0.15s; white-space: nowrap;
  }

  .btn-cyan {
    background: linear-gradient(90deg, #00bcd4, #00acc1);
    color: white;
  }
  .btn-cyan:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-cyan:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  .btn-ghost-sm {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px; color: var(--silver);
    font-size: 12px; font-weight: 500;
    font-family: var(--font-sans);
    padding: 6px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .btn-ghost-sm:hover { color: var(--white); background: rgba(255,255,255,0.1); }

  .del-btn {
    background: var(--ru-dim); border: 1px solid rgba(239,83,80,0.22);
    border-radius: 7px; color: #ff7b7b;
    font-family: var(--font-sans); font-size: 12px; font-weight: 500;
    padding: 5px 12px; cursor: pointer; transition: all 0.15s;
  }
  .del-btn:hover { background: rgba(239,83,80,0.22); }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Alerts */
  .alert {
    display: none; align-items: center; gap: 10px;
    padding: 11px 14px; border-radius: 9px;
    font-size: 13px; margin-top: 14px;
  }
  .alert.show { display: flex; }
  .alert-icon { flex-shrink: 0; }
  .alert-success { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.28); color: #81c784; }
  .alert-error   { background: var(--ru-dim); border: 1px solid rgba(239,83,80,0.28); color: #ff7b7b; }

  /* Users list */
  .users-list { display: flex; flex-direction: column; gap: 10px; }

  .user-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 15px;
    background: var(--panel);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .user-left { display: flex; align-items: center; gap: 12px; }

  .user-avatar {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .avatar-admin  { background: var(--cyan-dim); color: var(--cyan); }
  .avatar-viewer { background: var(--sa-dim); color: var(--sapphire); }

  .user-name { font-size: 14px; font-weight: 600; color: var(--white); }
  .user-meta { font-size: 11.5px; color: var(--smoke); margin-top: 2px; }

  .user-right { display: flex; align-items: center; gap: 10px; }

  .role-pill {
    padding: 3px 9px; border-radius: 5px;
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
  }
  .pill-admin  { background: var(--cyan-dim); color: var(--cyan); }
  .pill-viewer { background: var(--sa-dim); color: var(--sapphire); }
  .protected-tag { font-family: var(--font-mono); font-size: 10px; color: var(--smoke); }

  .loading-text, .empty-users {
    text-align: center; padding: 28px;
    color: var(--smoke); font-size: 13.5px;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
        <line x1="6" y1="15" x2="10" y2="15"/>
        <line x1="13" y1="15" x2="16" y2="15"/>
      </svg>
    </div>
    <div class="brand-name">JVW Ledger</div>
  </div>
  <button class="back-btn" onclick="window.location.href='index.html'">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Dashboard
  </button>
</header>

<div class="page-body">
  <div class="page-wrap">

    <div class="page-head">
      <div class="page-eyebrow">Administration</div>
      <div class="page-title">Manage Users</div>
      <div class="page-desc">Create new system accounts and manage existing user access.</div>
    </div>

    <!-- Create User -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">Create New User</span>
      </div>
      <div class="section-body">
        <div class="form-row">
          <div class="field">
            <label for="reg-username">Username</label>
            <div class="field-input-wrap">
              <input type="text" id="reg-username" placeholder="Enter username" autocomplete="off">
            </div>
            <div class="field-hint" id="username-hint">&nbsp;</div>
          </div>
          <div class="field">
            <label for="reg-role">Role</label>
            <select id="reg-role">
              <option value="viewer">Viewer — view only</option>
              <option value="admin">Admin — full access</option>
            </select>
          </div>
        </div>

        <div class="field" style="margin-bottom: 20px;">
          <label for="reg-password">Password</label>
          <div class="field-input-wrap">
            <input type="password" id="reg-password" placeholder="Enter a secure password">
            <button class="pw-toggle" type="button" onclick="togglePw()" tabindex="-1">
              <svg id="pw-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn btn-cyan" id="reg-btn" onclick="doRegister()">
          <div class="spinner"></div>
          <span class="btn-text">Create User</span>
        </button>

        <div class="alert alert-error" id="reg-error">
          <svg class="alert-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="reg-error-text"></span>
        </div>
        <div class="alert alert-success" id="reg-success">
          <svg class="alert-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span id="reg-success-text"></span>
        </div>
      </div>
    </div>

    <!-- Users list -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">System Users</span>
        <button class="btn-ghost-sm" onclick="loadUsers()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>
      <div class="section-body">
        <div class="users-list" id="users-list">
          <div class="loading-text">Loading users…</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const __u = (function() {
    try { return JSON.parse(localStorage.getItem('jvw_user') || 'null'); } catch(e) { return null; }
  })();
  if (!__u || !__u.token) { window.location.replace('login.html'); }
  else if (__u.role !== 'admin') { alert('Admin access required.'); window.location.replace('index.html'); }

  function authHeaders() { return { 'Content-Type': 'application/json', 'X-User-Role': __u.role }; }

  function togglePw() {
    const inp = document.getElementById('reg-password');
    const ico = document.getElementById('pw-eye');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    ico.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  let usernameCheckTimer = null;
  let existingUsernames = [];

  document.getElementById('reg-username').addEventListener('input', function() {
    clearTimeout(usernameCheckTimer);
    usernameCheckTimer = setTimeout(() => checkUsername(this.value.trim()), 400);
  });

  function checkUsername(val) {
    const hint = document.getElementById('username-hint');
    const input = document.getElementById('reg-username');
    if (!val) { hint.innerHTML = '&nbsp;'; hint.className = 'field-hint'; input.classList.remove('input-error'); return; }
    if (existingUsernames.includes(val.toLowerCase())) {
      hint.textContent = '✕  Username already taken'; hint.className = 'field-hint error'; input.classList.add('input-error');
    } else {
      hint.textContent = '✓  Username available'; hint.className = 'field-hint success'; input.classList.remove('input-error');
    }
  }

  function clearUsernameError() {
    document.getElementById('username-hint').innerHTML = '&nbsp;';
    document.getElementById('username-hint').className = 'field-hint';
    document.getElementById('reg-username').classList.remove('input-error');
  }

  async function loadUsers() {
    const list = document.getElementById('users-list');
    list.innerHTML = '<div class="loading-text">Loading…</div>';
    try {
      const res = await fetch('/api/auth/users', { headers: authHeaders() });
      const data = await res.json();
      existingUsernames = data.map(u => u.username.toLowerCase());
      if (!data.length) { list.innerHTML = '<div class="empty-users">No users found.</div>'; return; }
      list.innerHTML = data.map(u => `
        <div class="user-row" id="user-row-${u.id}">
          <div class="user-left">
            <div class="user-avatar ${u.role === 'admin' ? 'avatar-admin' : 'avatar-viewer'}">${u.username.substring(0,2).toUpperCase()}</div>
            <div>
              <div class="user-name">${u.username}</div>
              <div class="user-meta">Created ${new Date(u.createdAt).toLocaleDateString('en-PH', {month:'short',day:'numeric',year:'numeric'})}</div>
            </div>
          </div>
          <div class="user-right">
            <span class="role-pill pill-${u.role}">${u.role}</span>
            ${u.username === 'admin' ? '<span class="protected-tag">protected</span>' : `<button class="del-btn" onclick="deleteUser(${u.id},'${u.username}')">Delete</button>`}
          </div>
        </div>`).join('');
    } catch(e) {
      list.innerHTML = '<div class="empty-users" style="color:#ff7b7b">Failed to load users.</div>';
    }
  }

  async function deleteUser(id, username) {
    if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
    try {
      const res = await fetch(`/api/auth/users/${id}`, { method:'DELETE', headers: authHeaders() });
      if (res.ok) {
        document.getElementById(`user-row-${id}`)?.remove();
        existingUsernames = existingUsernames.filter(u => u !== username.toLowerCase());
        checkUsername(document.getElementById('reg-username').value.trim());
      } else { alert('Failed to delete user.'); }
    } catch(e) { alert('Server error.'); }
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const role     = document.getElementById('reg-role').value;
    const btn      = document.getElementById('reg-btn');
    const errEl    = document.getElementById('reg-error');
    const errTxt   = document.getElementById('reg-error-text');
    const okEl     = document.getElementById('reg-success');
    const okTxt    = document.getElementById('reg-success-text');

    errEl.classList.remove('show'); okEl.classList.remove('show');

    if (!username) { errTxt.textContent = 'Username is required.'; errEl.classList.add('show'); return; }
    if (!password) { errTxt.textContent = 'Password is required.'; errEl.classList.add('show'); return; }
    if (password.length < 6) { errTxt.textContent = 'Password must be at least 6 characters.'; errEl.classList.add('show'); return; }
    if (existingUsernames.includes(username.toLowerCase())) {
      errTxt.textContent = `Username "${username}" is already taken.`; errEl.classList.add('show');
      document.getElementById('reg-username').classList.add('input-error'); return;
    }

    btn.disabled = true; btn.classList.add('loading');
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST', headers: authHeaders(), body: JSON.stringify({ username, password, role })
      });
      if (!res.ok) {
        const text = await res.text();
        errTxt.textContent = text.includes('already exists') ? `Username "${username}" is already taken.` : (text || 'Failed to create user.');
        errEl.classList.add('show');
        if (text.includes('already exists')) document.getElementById('reg-username').classList.add('input-error');
        return;
      }
      okTxt.textContent = `User "${username}" created successfully as ${role}.`; okEl.classList.add('show');
      document.getElementById('reg-username').value = '';
      document.getElementById('reg-password').value = '';
      document.getElementById('reg-role').value = 'viewer';
      clearUsernameError(); loadUsers();
    } catch(e) {
      errTxt.textContent = 'Server error. Make sure the app is running.'; errEl.classList.add('show');
    } finally { btn.disabled = false; btn.classList.remove('loading'); }
  }

  document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  loadUsers();
</script>
</body>
</html>
