<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVW Ledger — Manage Users</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11; --surface: #16181c; --surface2: #1e2028;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #eaeaea; --muted: #7a7f8e;
    --accent: #c8f567; --accent-dim: rgba(200,245,103,0.12); --accent-text: #2a3800;
    --red: #ff5f5f; --red-dim: rgba(255,95,95,0.12);
    --green: #4cd97b; --green-dim: rgba(76,217,123,0.12);
    --blue: #5ba4f5; --blue-dim: rgba(91,164,245,0.12);
    --font-head: 'Fraunces', serif; --font-mono: 'DM Mono', monospace; --font-body: 'DM Sans', sans-serif;
  }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; display: flex; justify-content: center; }
  .wrap { width: 560px; max-width: 100%; }

  /* Header */
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .logo-row { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 38px; height: 38px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .logo-name { font-family: var(--font-head); font-size: 20px; font-weight: 600; color: var(--accent); }
  .back-btn { background: transparent; color: var(--muted); border: 1px solid var(--border2); border-radius: 7px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: var(--font-body); transition: all 0.15s; }
  .back-btn:hover { color: var(--text); background: var(--surface2); }

  /* Section cards */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .section-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: var(--text); text-transform: uppercase; letter-spacing: 0.8px; }
  .section-body { padding: 20px; }

  /* Form */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.8px; }
  .field input, .field select { background: var(--bg); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: var(--font-body); font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .field input.input-error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }
  .field select option { background: #1e2028; }
  .field-hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .field-hint.error { color: var(--red); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 7px; font-size: 13px; font-weight: 500; font-family: var(--font-body); cursor: pointer; border: none; outline: none; transition: all 0.15s; }
  .btn-accent { background: var(--accent); color: var(--accent-text); }
  .btn-accent:hover { background: #d8ff7a; transform: translateY(-1px); }
  .btn-accent:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-full { width: 100%; justify-content: center; }

  /* Alerts */
  .alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; }
  .alert.show { display: block; }
  .alert-error { background: var(--red-dim); border: 1px solid rgba(255,95,95,0.2); color: var(--red); }
  .alert-success { background: var(--green-dim); border: 1px solid rgba(76,217,123,0.2); color: var(--green); }

  /* Users list */
  .users-list { display: flex; flex-direction: column; gap: 8px; }
  .user-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: 8px; padding: 12px 16px; }
  .user-info { display: flex; align-items: center; gap: 12px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .avatar-admin { background: var(--accent-dim); color: var(--accent); }
  .avatar-viewer { background: var(--blue-dim); color: var(--blue); }
  .user-name { font-size: 14px; font-weight: 500; }
  .user-meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-family: var(--font-mono); font-weight: 500; }
  .badge-admin { background: var(--accent-dim); color: var(--accent); }
  .badge-viewer { background: var(--blue-dim); color: var(--blue); }
  .del-btn { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,95,95,0.2); border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: var(--font-body); transition: all 0.15s; }
  .del-btn:hover { background: rgba(255,95,95,0.25); }
  .empty-users { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }
  .loading-text { color: var(--muted); font-size: 13px; padding: 16px 0; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="5" width="16" height="2.5" rx="1.2" fill="#0e0f11"/>
          <rect x="2" y="9" width="11" height="2.5" rx="1.2" fill="#0e0f11"/>
          <rect x="2" y="13" width="7" height="2.5" rx="1.2" fill="#0e0f11"/>
          <path d="M15 10 L18 13 L15 16" stroke="#0e0f11" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="logo-name">JVW Ledger</div>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Dashboard</button>
  </div>

  <!-- Create new user -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Create New User</span>
    </div>
    <div class="section-body">
      <div class="form-row">
        <div class="field">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="e.g. juan_dela_cruz" autocomplete="off" oninput="clearUsernameError()">
          <span class="field-hint" id="username-hint"> </span>
        </div>
        <div class="field">
          <label>Role</label>
          <select id="reg-role">
            <option value="viewer">Viewer — view only</option>
            <option value="admin">Admin — full access</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Enter a secure password">
      </div>
      <button class="btn btn-accent btn-full" id="reg-btn" onclick="doRegister()">Create User</button>
      <div class="alert alert-error" id="reg-error"></div>
      <div class="alert alert-success" id="reg-success"></div>
    </div>
  </div>

  <!-- Existing users -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">System Users</span>
      <button onclick="loadUsers()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-family:var(--font-body);">↻ Refresh</button>
    </div>
    <div class="section-body">
      <div class="users-list" id="users-list">
        <div class="loading-text">Loading users…</div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Auth guard — must be admin ─────────────────────────────────────────────
  const __u = (function() {
    try { return JSON.parse(localStorage.getItem('jvw_user') || 'null'); } catch(e) { return null; }
  })();

  if (!__u || !__u.token) {
    window.location.replace('login.html');
  } else if (__u.role !== 'admin') {
    alert('Admin access required.');
    window.location.replace('index.html');
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'X-User-Role': __u.role };
  }

  // ── Username duplicate check ───────────────────────────────────────────────
  let usernameCheckTimer = null;
  let existingUsernames  = [];

  document.getElementById('reg-username').addEventListener('input', function() {
    clearTimeout(usernameCheckTimer);
    usernameCheckTimer = setTimeout(() => checkUsername(this.value.trim()), 400);
  });

  function checkUsername(val) {
    const hint  = document.getElementById('username-hint');
    const input = document.getElementById('reg-username');
    if (!val) { hint.textContent = ' '; hint.className = 'field-hint'; input.classList.remove('input-error'); return; }
    if (existingUsernames.includes(val.toLowerCase())) {
      hint.textContent = 'Username already taken.';
      hint.className   = 'field-hint error';
      input.classList.add('input-error');
    } else {
      hint.textContent = 'Username is available.';
      hint.className   = 'field-hint';
      hint.style.color = 'var(--green)';
      input.classList.remove('input-error');
    }
  }

  function clearUsernameError() {
    const hint  = document.getElementById('username-hint');
    const input = document.getElementById('reg-username');
    hint.textContent = ' ';
    hint.className   = 'field-hint';
    input.classList.remove('input-error');
  }

  // ── Load users ─────────────────────────────────────────────────────────────
  async function loadUsers() {
    const list = document.getElementById('users-list');
    list.innerHTML = '<div class="loading-text">Loading…</div>';
    try {
      const res  = await fetch('/api/auth/users', { headers: authHeaders() });
      const data = await res.json();

      // Store usernames for duplicate check
      existingUsernames = data.map(u => u.username.toLowerCase());

      if (!data.length) {
        list.innerHTML = '<div class="empty-users">No users found.</div>';
        return;
      }

      list.innerHTML = data.map(u => `
        <div class="user-row" id="user-row-${u.id}">
          <div class="user-info">
            <div class="user-avatar ${u.role === 'admin' ? 'avatar-admin' : 'avatar-viewer'}">
              ${u.username.substring(0,2).toUpperCase()}
            </div>
            <div>
              <div class="user-name">${u.username}</div>
              <div class="user-meta">Created ${new Date(u.createdAt).toLocaleDateString('en-PH', {month:'short',day:'numeric',year:'numeric'})}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="badge badge-${u.role}">${u.role}</span>
            ${u.username === 'admin'
              ? '<span style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">protected</span>'
              : `<button class="del-btn" onclick="deleteUser(${u.id},'${u.username}')">Delete</button>`
            }
          </div>
        </div>`).join('');
    } catch(e) {
      list.innerHTML = '<div class="empty-users" style="color:var(--red)">Failed to load users.</div>';
    }
  }

  // ── Delete user ────────────────────────────────────────────────────────────
  async function deleteUser(id, username) {
    if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
    try {
      const res = await fetch(`/api/auth/users/${id}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      if (res.ok) {
        document.getElementById(`user-row-${id}`)?.remove();
        existingUsernames = existingUsernames.filter(u => u !== username.toLowerCase());
        // re-check username field if it matches deleted user
        checkUsername(document.getElementById('reg-username').value.trim());
      } else {
        alert('Failed to delete user.');
      }
    } catch(e) { alert('Server error.'); }
  }

  // ── Create user ────────────────────────────────────────────────────────────
  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const role     = document.getElementById('reg-role').value;
    const btn      = document.getElementById('reg-btn');
    const errEl    = document.getElementById('reg-error');
    const okEl     = document.getElementById('reg-success');

    errEl.classList.remove('show');
    okEl.classList.remove('show');

    if (!username) {
      errEl.textContent = 'Username is required.';
      errEl.classList.add('show');
      return;
    }
    if (!password) {
      errEl.textContent = 'Password is required.';
      errEl.classList.add('show');
      return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.classList.add('show');
      return;
    }

    // Client-side duplicate check before hitting server
    if (existingUsernames.includes(username.toLowerCase())) {
      errEl.textContent = `Username "${username}" is already taken. Please choose a different one.`;
      errEl.classList.add('show');
      document.getElementById('reg-username').classList.add('input-error');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Creating…';

    try {
      const res = await fetch('/api/auth/register', {
        method:  'POST',
        headers: authHeaders(),
        body:    JSON.stringify({ username, password, role })
      });

      if (!res.ok) {
        const text = await res.text();
        errEl.textContent = text.includes('already exists')
          ? `Username "${username}" is already taken. Please choose a different one.`
          : (text || 'Failed to create user.');
        errEl.classList.add('show');
        if (text.includes('already exists')) {
          document.getElementById('reg-username').classList.add('input-error');
        }
        return;
      }

      okEl.textContent = `User "${username}" created successfully as ${role}.`;
      okEl.classList.add('show');
      document.getElementById('reg-username').value = '';
      document.getElementById('reg-password').value = '';
      document.getElementById('reg-role').value     = 'viewer';
      clearUsernameError();
      loadUsers();

    } catch(e) {
      errEl.textContent = 'Server error. Make sure the app is running.';
      errEl.classList.add('show');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Create User';
    }
  }

  // Enter key support
  document.getElementById('reg-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });

  // Load on page ready
  loadUsers();
</script>
</body>
</html>
